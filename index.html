<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת מלחמות ישראל - גרסה סופית</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root { --blue: #2563eb; --bg: #f8fafc; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; }
        
        #main-container { display: flex; flex-direction: column; height: 100vh; }
        #header { height: 60px; background: white; border-bottom: 2px solid #ddd; display: flex; align-items: center; padding: 0 20px; z-index: 2000; flex-shrink: 0; }
        
        #layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        #panel { width: 300px; background: white; border-left: 1px solid #ddd; padding: 15px; overflow-y: auto; z-index: 1000; }
        
        /* המפה חייבת לקבל גובה מלא */
        #map { flex: 1; height: 100%; position: relative; z-index: 1; background: #eee; }

        /* ממשק משחק - שים לב ל-pointer-events */
        #gov-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 5000; pointer-events: none; display: none; 
        }
        #gov-layer.active { display: block; }
        
        #game-card { 
            pointer-events: auto; background: white; width: 350px; margin: 20px auto; 
            padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid var(--blue); text-align: center;
        }

        .badge { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .marker-label { font-weight: bold; background: white; border: 1px solid black; padding: 2px; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <strong style="margin-left: 20px;">מפת מלחמות ישראל</strong>
        <select id="war-select" style="padding: 5px;"><option value="all">בחר מערכה...</option></select>
        <button onclick="startGame()" style="margin-right: auto; padding: 8px 15px; cursor:pointer; background: #16a34a; color: white; border: none; border-radius: 5px;">🎮 התחל משחק</button>
    </div>

    <div id="layout">
        <div id="panel">
            <h3 id="p-name">פרטי מדינה</h3>
            <div id="p-content">בחר מדינה מהמפה או מהתפריט.</div>
        </div>
        <div id="map"></div>
        
        <div id="gov-layer">
            <div id="game-card">
                <div id="q-text" style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">טוען...</div>
                <div style="color: var(--blue); font-size: 14px; margin-bottom: 10px;">📍 לחץ על המדינה הנכונה במפה!</div>
                <div id="feedback" style="display:none; margin-top: 10px; padding: 10px; border-radius: 8px;"></div>
                <button id="next-btn" onclick="nextQuestion()" style="display:none; margin-top: 10px; padding: 10px; width: 100%; cursor: pointer;">השאלה הבאה ←</button>
                <div id="final-score" style="display:none;">
                    <h2 id="score-text"></h2>
                    <button onclick="location.reload()" style="padding: 10px; cursor: pointer;">סגור וחזור למפה</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DATA = [
    {war:"מלחמת העצמאות", year:1948, country:"מצרים", motives:"מניעת הקמת המדינה", coords:[26.8, 30.8]},
    {war:"מלחמת העצמאות", year:1948, country:"ירדן", motives:"שליטה בירושלים", coords:[31.2, 36.5]},
    {war:"מלחמת ששת הימים", year:1967, country:"סוריה", motives:"סכסוך על מקורות המים", coords:[34.8, 38.9]},
    {war:"מלחמת יום הכיפורים", year:1973, country:"מצרים", motives:"השבת סיני", coords:[26.8, 30.8]},
    {war:"חרבות ברזל", year:2023, country:"איראן", motives:"השמדת ישראל", coords:[32.4, 53.7]}
];

let map, markers = [], gameActive = false, currentIdx = 0, score = 0, currentQ = null;

function init() {
    console.log("Initializing map...");
    map = L.map('map').setView([31.5, 38.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // תיקון נראות למפה
    setTimeout(() => { map.invalidateSize(); }, 500);

    const wars = [...new Set(DATA.map(d => d.war))];
    const select = document.getElementById("war-select");
    wars.forEach(w => {
        let opt = document.createElement("option"); opt.value = w; opt.textContent = w; select.appendChild(opt);
    });
    select.onchange = renderMarkers;

    renderMarkers();
}

function renderMarkers() {
    if(gameActive) return;
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const val = document.getElementById("war-select").value;
    const items = val === "all" ? DATA : DATA.filter(d => d.war === val);

    items.forEach(item => {
        const m = L.marker(item.coords).addTo(map);
        m.bindTooltip(item.country);
        m.on('click', () => {
            document.getElementById("p-name").textContent = item.country;
            document.getElementById("p-content").innerHTML = `<b>מערכה:</b> ${item.war}<br><b>מניע:</b> ${item.motives}`;
        });
        markers.push(m);
    });
}

function startGame() {
    gameActive = true; currentIdx = 0; score = 0;
    document.getElementById("gov-layer").classList.add("active");
    document.getElementById("header").style.pointerEvents = "none";
    nextQuestion();
}

function nextQuestion() {
    if(currentIdx >= 3) { finishGame(); return; }
    
    document.getElementById("feedback").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
    
    currentQ = DATA[Math.floor(Math.random() * DATA.length)];
    document.getElementById("q-text").textContent = `שאלה ${currentIdx + 1}: איזו מדינה פעלה ב-${currentQ.war} במטרה: "${currentQ.motives}"?`;
    
    // מנקים ומציגים את כל המדינות האפשריות כפתורים על המפה
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    
    const uniqueCountries = [...new Set(DATA.map(d => d.country))];
    uniqueCountries.forEach(name => {
        const d = DATA.find(x => x.country === name);
        const m = L.marker(d.coords).addTo(map);
        m.on('click', () => checkAnswer(name));
        markers.push(m);
    });
}

function checkAnswer(name) {
    if(document.getElementById("feedback").style.display === "block") return;
    
    const isCorrect = name === currentQ.country;
    if(isCorrect) score++;
    
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    fb.style.background = isCorrect ? "#dcfce7" : "#fee2e2";
    fb.textContent = isCorrect ? "✅ נכון מאוד!" : `❌ טעות. התשובה היא ${currentQ.country}`;
    
    document.getElementById("next-btn").style.display = "block";
    currentIdx++;
}

function finishGame() {
    document.getElementById("q-text").style.display = "none";
    document.getElementById("feedback").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("final-score").style.display = "block";
    document.getElementById("score-text").textContent = `סיימת! הניקוד שלך: ${score} מתוך 3`;
}

window.onload = init;
</script>
</body>
</html>
