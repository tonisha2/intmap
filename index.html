<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת מלחמות ישראל</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f0f4f8; --gold2:#d4a840; --blue:#2563eb;
            --txt:#1e293b; --txt3:#94a3b8; --pw:360px; --hh:66px;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body, html { font-family:'Assistant',sans-serif; background:var(--bg); color:var(--txt); height:100%; width:100%; overflow:hidden; direction:rtl; }
        #main-container { display: flex; flex-direction: column; height: 100vh; }
        #header { 
            height:var(--hh); background:#fff; border-bottom:1px solid #cbd5e1; 
            display:flex; align-items:center; padding:0 16px; z-index:2000; gap:12px; 
        }
        #lw { width:52px; height:52px; border-radius:50%; overflow:hidden; border:2px solid var(--gold2); }
        #lw img { width:100%; height:100%; object-fit:cover; }
        #tb h1 { font-family:'Frank Ruhl Libre',serif; font-size:16px; color:var(--blue); }
        #layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        #panel { width: var(--pw); background: white; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; z-index: 1000; }
        #map { flex: 1; height: 100%; position: relative; z-index: 1; background: #eee; }
        #gov-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5000; pointer-events: none; display: none; }
        #gov-layer.active { display: block; }
        #game-card { pointer-events: auto; background: white; width: 400px; margin: 20px auto; padding: 25px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 3px solid var(--blue); text-align: center; }
        #progress-bar { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }
        .icard { border:1px solid #e2e8f0; border-radius:12px; padding:12px; margin-bottom:10px; text-align: right; }
        .icard-title { font-size:10px; font-weight:700; color:var(--txt3); }
        .btn-action { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-game { background: #16a34a; color: white; margin-right: auto; }
        @media(max-width:768px) { #layout { flex-direction: column-reverse; } #panel { width: 100%; height: 35%; } }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <div id="lw"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAACgCAIAAAAErfB6AACTdklEQVR42uy9dZxc15E2XOecS809zJrRiJmZLLAsM7Mdcpgcx3FoN4mTTRy0ncRJHIccO2ZmkGxZzEwzGg1omJvh0jn1/XG7e3okJ5t9d9/3+979tqOf0+oZ9fTculWn6qmnniKICP8dH8vWXkEIOf91RDzndUR0LsKuza//97sO5L+BgRdfcKnzq1BKATPGI4Q4hnR+wfONmvu2fBs7DyFE5gngvi1v/Y+B/194LLrgYkCCiJRSQggiEuJYK2NISmnOco6xc79pzomdf+48cYzqfFvuOQAgIAABFAi4b+s7/2Pg/42PhSsvzrodAAFEIEByrplz2ZyBnV8tZ86cmc+x9DlGzT3P928g6Pw/IhIggGTf9rf/x8D/NY8FKy8CHDEeIlLmXPeMgXMmdNwx3zajftU8P863fc7quffhnOe/bdbAkLk3EAgQhMyL+7e9+z8G/l95zF1+ERDOCAUgzsma56yZyJnvwYjIGMs3W/4BnHvxfB8934NHbgLnByE68cCxrhO3EZFQQgG44CgoABzc+e7/GPifesxbdiGAhEQQIiihAIACCKGE5AxGM4H6PAfNt2V+MnWOW5+fS+dM7jx33gAJCEQQwokNgo+Ed4GCMkoQheCILPOugId2bvofA//dx+ylawk4jkEEAQLI6Eg0zj9f8/3ynNdzXnu+jQkCIQTJKJPnB+1sHBbOT0Pn+iAQAEKIEAIRCQACCMy8DULuByAgoEBCyKFdm/7HwKO9dvmFwjEMEkoIEoKEAAqauYrE8eCM8wEhlJyTBzkv5gyWS6xG/YJk5EbJvznOuQhCcCBACAgEIRAQqHPoOv8KAQkIQIKZUgrBuQNACOdFQigKIQ7vev9/DAyzl6wBkom6jgkoAQQKQAF4NiwTSijJXmVCRgI0IcSxmfNr0KzjCiFyFdRI+Zutos4xbf49kXFTSpw4jAiQ/R46knMR5xiGnItnT2vnbfJTtkM73/v/qYHnLFlLch5AMlZDyHii87mocxYigABKqWNgIIJSitkPzwhzPMn5fufYzp6j5BwbnxPYz/n1z02nURAEQgkCCiEcAwt0bJm5xzJeSzKZV+4myH0AIQRyOLpv8/+PDDxr8RoAIACUEOHEPUqc8OlcXEqJk7LSTNR1ntOsIwpCCGQtR4ERkjEwAcLyvpT1y9ypi+cYOGcG5/vzUy3HgzOfChCFyOTYQAEJEOFEDc6RAuTybfKhBhZACAGCR3Zv/u9v4NlL1hBBBGRr0JwHO9cAOaGEAkVBkCChQLLhN/MdQMSo3Cr7TzHr3tlHHgZ5Dgryj0Dpc8DLfIM5ha/IvYxCAIAgFBDouTdHfvzP3HoIXIjje7f8tzXwzMWrAYACIUiQZE41JJmTlUI2LaXACAMkAkQGy3A8LGeSUchU1qg4CpzKNymiyCKOMLqeJvmmPT+vzjd2Fu4giAJHgdiEAhICfDQWNurN834MoRQAjv6fcmX6f866i1YTJ/tEQKe6IJBfsTh/RUIQCQIgEXCOz+UfmdnchwACCsgWNkAAQSCKrE0QAJ3smhAgox851xyViGXSKkEoIEEkThKFhAI48QTy7h6kTtUl8ozo3CaOXUUuEoy+GjMWXfDfx4NnLrrASTBHMOGsOSlQp8QBQhwHJeh8EzhpNY7CkAUlND+ujip2cXRC7dw7xCmNMm9/jgd/CAySKWUFpZk3QkAUSBCBEJF3GxBCBCIKQjJfyToqZm5EQkdAMZIfJ5wPnI3nx/dt/b/bg2cuWu34UQaFyKEDAgkCosjgDyID7hICQBBBZGDBXHgEAKAZAznBFgEFODXpCHiBmT8jIVQgOk6efR+RfSCK3A/JxlJEFCQvaCAfic7n4CEgkDpYiBNNkOSsmyu3s1Z3fqXsKZCXVUxfuOr/YgNPW7A         <div id="tb"><h1>מפת מלחמות ישראל<span>ויזואליזציה היסטורית</span></h1></div>
        <div style="margin-right: 20px;">
            <select id="war-select" style="padding: 5px; border-radius: 5px;">
                <option value="all">כל המלחמות</option>
            </select>
        </div>
        <button class="btn-action btn-game" onclick="startGame()">🎮 מצב משחק (25 שאלות)</button>
    </div>

    <div id="layout">
        <div id="panel">
            <h2 id="p-name">בחר מדינה במפה</h2>
            <hr style="margin: 15px 0;">
            <div id="p-content">לחץ על סמן במפה כדי לראות את המניעים והתוצאות של כל מדינה בעימות.</div>
        </div>
        <div id="map"></div>
        <div id="gov-layer">
            <div id="game-card">
                <div id="progress-bar"><div id="progress-fill"></div></div>
                <div id="q-text" style="font-size: 18px; font-weight: bold; margin-bottom: 15px; min-height: 60px;">טוען שאלה...</div>
                <div style="color: #2563eb; font-size: 14px; margin-bottom: 15px; font-weight: bold;">📍 משימה: מצא את המדינה ולחץ על הסמן שלה במפה!</div>
                <div id="feedback" style="display:none; margin-top: 15px; padding: 15px; border-radius: 10px; text-align: right;"></div>
                <button id="next-btn" class="btn-action" style="display:none; background:#2563eb; color:white; width:100%; margin-top:15px;" onclick="nextQuestion()">המשך לשאלה הבאה ←</button>
                <div id="final-score" style="display:none;">
                    <h2 id="score-text" style="font-size: 32px; color: #b8860b;"></h2>
                    <button class="btn-action" style="background:#2563eb; color:white;" onclick="location.reload()">חזרה למפה</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DATA = [
    {war:"מלחמת העצמאות",year:1948,country:"מצרים",role:"צד פעיל (פולש)",motives:"מניעת הקמת המדינה, הנהגת העולם הערבי",outcome:"תבוסה צבאית והסכמי שביתת נשק"},
    {war:"מלחמת העצמאות",year:1948,country:"ירדן",role:"צד פעיל (פולש)",motives:"שליטה טריטוריאלית בירושלים ובגדה",outcome:"סיפוח הגדה המערבית"},
    {war:"מלחמת העצמאות",year:1948,country:"סוריה",role:"צד פעיל (פולש)",motives:"בלימת הציונות, אינטרס טריטוריאלי",outcome:"הקמת אזורים מפורזים"},
    {war:"מלחמת העצמאות",year:1948,country:"עיראק",role:"צד פעיל (פולש)",motives:"סולידריות פאן-ערבית",outcome:"נסיגה ללא הסכם רשמי"},
    {war:"מלחמת העצמאות",year:1948,country:"לבנון",role:"צד פעיל (פולש)",motives:"לחץ ערבי פנימי וחיצוני",outcome:"נסיגה לקו הגבול הבינלאומי"},
    {war:"מלחמת סיני",year:1956,country:"מצרים",role:"צד מותקף",motives:"הלאמת תעלת סואץ, אנטי-קולוניאליזם",outcome:"הישג מדיני למרות מפלה צבאית"},
    {war:"מלחמת ששת הימים",year:1967,country:"מצרים",role:"צד פעיל",motives:"חסימת מצרי טיראן",outcome:"איבוד חצי האי סיני ורצועת עזה"},
    {war:"מלחמת ששת הימים",year:1967,country:"סוריה",role:"צד פעיל",motives:"סכסוך על מקורות המים",outcome:"איבוד רמת הגולן"},
    {war:"מלחמת יום הכיפורים",year:1973,country:"מצרים",role:"צד פעיל (יוזם)",motives:"השבת סיני וכבוד לאומי",outcome:"פתיחת הדרך להסכם שלום"},
    {war:"מלחמת יום הכיפורים",year:1973,country:"עיראק",role:"חיל משלוח",motives:"הצלת דמשק מנפילה",outcome:"אבדות כבדות בחזית"},
    {war:"חרבות ברזל",year:2023,country:"איראן",role:"הובלה ומימון",motives:"השמדת ישראל, הגמוניה אזורית",outcome:"עימות ישיר וסנקציות"},
    {war:"חרבות ברזל",year:2024,country:"תימן (חותים)",role:"תוקפת ימית",motives:"מצור ימי וסולידריות עם עזה",outcome:"תקיפות קואליציה והרתעה"},
    {war:"חרבות ברזל",year:2024,country:"לבנון",role:"חזית פעילה",motives:"רתימת ישראל לחזית נוספת",outcome:"הרס תשתיתי נרחב בדרום לבנון"}
];

const GEO = {
    "מצרים":[26.8, 30.8], "ירדן":[31.2, 36.5], "סוריה":[34.8, 38.9], "עיראק":[33.2, 43.7],
    "לבנון":[33.9, 35.9], "איראן":[32.4, 53.7], "תימן (חותים)":[15.4, 44.2]
};

let map, activeMarkers = [], gameActive = false, gIdx = 0, gScore = 0, currentQ = null;
const Q_TOTAL = 25;

function init() {
    map = L.map('map').setView([31.5, 38.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    setTimeout(() => map.invalidateSize(), 500);

    const wars = [...new Set(DATA.map(d => d.war))];
    const select = document.getElementById("war-select");
    wars.forEach(w => {
        let opt = document.createElement("option"); opt.value = w; opt.textContent = w; select.appendChild(opt);
    });
    select.onchange = renderMarkers;
    renderMarkers();
}

function renderMarkers() {
    if(gameActive) return;
    activeMarkers.forEach(m => map.removeLayer(m));
    activeMarkers = [];

    const val = document.getElementById("war-select").value;
    const items = val === "all" ? DATA : DATA.filter(d => d.war === val);

    items.forEach(item => {
        if(GEO[item.country]) {
            const m = L.marker(GEO[item.country]).addTo(map);
            m.bindTooltip(item.country);
            m.on('click', () => {
                document.getElementById("p-name").textContent = item.country;
                document.getElementById("p-content").innerHTML = `
                    <div class="icard"><div class="icard-title">מערכה</div><b>${item.war}</b></div>
                    <div class="icard"><div class="icard-title">מניעים</div>${item.motives}</div>
                    <div class="icard"><div class="icard-title">תוצאות</div>${item.outcome}</div>`;
            });
            activeMarkers.push(m);
        }
    });
}

function startGame() {
    gameActive = true; gIdx = 0; gScore = 0;
    document.getElementById("gov-layer").classList.add("active");
    nextQuestion();
}

function nextQuestion() {
    if(gIdx >= Q_TOTAL) { finishGame(); return; }
    document.getElementById("feedback").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("progress-fill").style.width = `${(gIdx/Q_TOTAL)*100}%`;
    
    currentQ = DATA[Math.floor(Math.random() * DATA.length)];
    const types = ["motives", "outcome", "role"];
    const type = types[Math.floor(Math.random() * types.length)];
    
    let text = "";
    if(type === "motives") text = `איזו מדינה פעלה ב-<b>${currentQ.war}</b> מהמניע: "${currentQ.motives}"?`;
    else if(type === "outcome") text = `עבור מי הסתיימה <b>${currentQ.war}</b> בתוצאה: "${currentQ.outcome}"?`;
    else text = `מי הייתה ה-<b>${currentQ.role}</b> ב-${currentQ.war}?`;

    document.getElementById("q-text").innerHTML = text;
    
    activeMarkers.forEach(m => map.removeLayer(m));
    activeMarkers = [];
    Object.keys(GEO).forEach(c => {
        const m = L.marker(GEO[c]).addTo(map);
        m.on('click', () => checkAnswer(c));
        activeMarkers.push(m);
    });
}

function checkAnswer(ans) {
    if(document.getElementById("feedback").style.display === "block") return;
    const isCorrect = ans === currentQ.country;
    if(isCorrect) gScore++;
    
    const fb = document.getElementById("feedback");
    fb.style.display = "block";
    fb.style.background = isCorrect ? "#dcfce7" : "#fee2e2";
    fb.innerHTML = `<b>${isCorrect ? "נכון!" : "טעות."}</b> המדינה היא ${currentQ.country}.<br>${currentQ.outcome}`;
    document.getElementById("next-btn").style.display = "block";
    gIdx++;
}

function finishGame() {
    document.getElementById("q-text").style.display = "none";
    document.getElementById("feedback").style.display = "none";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("final-score").style.display = "block";
    document.getElementById("score-text").textContent = `ניקוד: ${gScore} מתוך ${Q_TOTAL}`;
}

window.onload = init;
</script>
</body>
</html>
