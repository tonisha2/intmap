<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מפת מלחמות ישראל - בדיקה</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        #header { height: 60px; background: #2563eb; color: white; display: flex; align-items: center; padding: 0 20px; z-index: 1001; position: relative; }
        #layout { display: flex; height: calc(100vh - 60px); }
        #map { flex: 1; background: #e5e7eb; height: 100%; } /* חשוב: גובה 100% */
        #panel { width: 300px; border-right: 1px solid #ccc; background: white; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="header">
    <h2>מפת מלחמות ישראל - גרסת בדיקה</h2>
</div>

<div id="layout">
    <div id="panel">
        <div id="pname">לחץ על מדינה במפה</div>
        <hr>
        <div id="pdetails">מידע יופיע כאן.</div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    console.log("Script started...");

    // נתונים בסיסיים לבדיקה
    const DATA = [
        {country: "מצרים", lat: 26.8, lng: 30.8, info: "מלחמת העצמאות, ששת הימים, יום כיפור"},
        {country: "סוריה", lat: 34.8, lng: 38.9, info: "מלחמת ששת הימים, יום כיפור"},
        {country: "ירדן", lat: 31.2, lng: 36.5, info: "מלחמת העצמאות, ששת הימים"}
    ];

    try {
        console.log("Initializing map...");
        // יצירת המפה
        const map = L.map('map').setView([31.5, 35.0], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        console.log("Adding markers...");
        // הוספת סמנים
        DATA.forEach(item => {
            const marker = L.marker([item.lat, item.lng]).addTo(map);
            marker.bindTooltip(item.country);
            marker.on('click', () => {
                document.getElementById('pname').innerText = item.country;
                document.getElementById('pdetails').innerText = item.info;
            });
        });

        console.log("Map ready!");
    } catch (e) {
        console.error("Map error:", e);
    }
</script>
</body>
</html>
