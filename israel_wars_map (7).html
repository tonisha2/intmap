<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפת מלחמות ישראל</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#4A90E2;
  --glass-bg:rgba(255,255,255,0.85);
  --glass-dark:rgba(20,18,14,0.90);
  --shadow:0 8px 32px 0 rgba(31,38,135,0.15);
  --shadow-dark:0 8px 32px 0 rgba(0,0,0,0.4);
  --brd:rgba(255,255,255,0.22);
  --brd-dark:rgba(80,70,55,0.5);
  --gold:#b8860b;--gold2:#d4a840;--gold3:#e8c870;
  --il:#1a56db;
  --ally:#0ea5c9;
  --enemy:#dc2626;
  --indirect:#f97316;
  --support:#16a34a;
  --neutral:#64748b;
  --txt:#1a1612;--txt2:#3a3020;--txt3:#6a5f52;
  --pw:360px;--hh:58px;--fh:34px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Assistant',sans-serif;background:#e8e4dc;color:var(--txt);height:100vh;overflow:hidden;direction:rtl}

#header{
  height:var(--hh);background:var(--glass-dark);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--brd-dark);
  display:flex;align-items:center;gap:14px;padding:0 18px;
  position:relative;z-index:1000;box-shadow:var(--shadow-dark);
}
#header::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
#lw{width:42px;height:42px;border-radius:50%;border:1px solid var(--gold);overflow:hidden;flex-shrink:0;box-shadow:0 0 10px rgba(184,134,11,.4)}
#lw img{width:100%;height:100%;object-fit:cover}
h1{font-family:'Frank Ruhl Libre',serif;font-size:17px;font-weight:900;color:var(--gold2);white-space:nowrap;letter-spacing:.03em}
h1 span{color:#a09080;font-weight:300;font-size:12px;margin-right:8px;font-family:'Assistant',sans-serif}
.fg{display:flex;align-items:center;gap:7px}
.fg label{font-size:11px;color:#a09080;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
select{
  background:rgba(255,255,255,0.12);border:1px solid var(--brd-dark);
  color:#e8dfc8;font-family:'Assistant',sans-serif;font-size:13px;
  padding:5px 10px;border-radius:8px;cursor:pointer;outline:none;max-width:190px;
  transition:border-color .2s;
}
select:focus{border-color:var(--gold)}
select option{background:#1d1a16;color:#e8dfc8}
#stats{display:flex;gap:8px;margin-right:auto}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;white-space:nowrap;font-weight:600}
.pt{border-color:var(--gold);color:var(--gold2);background:rgba(184,134,11,.1)}
.pa{border-color:var(--enemy);color:var(--enemy);background:rgba(220,38,38,.1)}

#layout{display:flex;height:calc(100vh - var(--hh) - var(--fh))}
#map{flex:1;z-index:1}

.leaflet-bar{border:none!important;box-shadow:var(--shadow)!important;border-radius:10px!important;overflow:hidden}
.leaflet-bar a{background-color:white!important;color:var(--primary)!important;border-bottom:1px solid #eee!important;font-size:16px!important;width:34px!important;height:34px!important;line-height:34px!important}
.leaflet-bar a:last-child{border-bottom:none!important}
.leaflet-bar a:hover{background:#f0f4ff!important}
.leaflet-control-attribution{display:none!important}
.leaflet-popup-content-wrapper{background:var(--glass-bg)!important;backdrop-filter:blur(10px)!important;-webkit-backdrop-filter:blur(10px)!important;border-radius:15px!important;padding:8px!important;box-shadow:var(--shadow)!important;border:1px solid var(--brd)!important;font-family:'Assistant',sans-serif!important}
.leaflet-popup-tip{background:var(--glass-bg)!important}
.mtt{background:var(--glass-bg)!important;backdrop-filter:blur(8px)!important;border:1px solid rgba(200,190,180,.4)!important;color:var(--txt)!important;font-family:'Assistant',sans-serif!important;font-size:12px!important;border-radius:8px!important;padding:4px 10px!important;box-shadow:var(--shadow)!important;font-weight:600}
.mtt::before{display:none!important}

#legend{
  position:absolute;bottom:14px;right:14px;z-index:500;
  background:var(--glass-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(200,190,180,.4);border-radius:12px;
  padding:12px 16px;font-size:11px;color:var(--txt);box-shadow:var(--shadow);
}
#legend b{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;font-weight:700}
.li{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.li:last-child{margin-bottom:0}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}

#panel{
  width:var(--pw);background:var(--glass-bg);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-right:1px solid rgba(200,190,180,.35);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
  box-shadow:var(--shadow);
}
#pempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#9a8878;padding:36px;text-align:center;line-height:1.7}
#pempty-ico{width:56px;height:56px;border-radius:50%;border:1px solid rgba(180,160,130,.3);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.4}
#pempty p{font-size:13px}
#pcon{display:none;flex-direction:column;height:100%;overflow:hidden}
#pcon.on{display:flex}
#phead{padding:18px 20px 14px;border-bottom:1px solid rgba(180,160,130,.2);background:rgba(255,255,255,0.6);flex-shrink:0;position:relative}
#phead::after{content:"";position:absolute;bottom:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
#pname{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900;color:var(--txt);margin-bottom:8px}
#pbdg{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid;font-weight:600}
#pbody{flex:1;overflow-y:auto;padding:16px 20px}
#pbody::-webkit-scrollbar{width:4px}
#pbody::-webkit-scrollbar-thumb{background:rgba(180,160,130,.3);border-radius:2px}
.sl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:18px 0 7px;display:flex;align-items:center;gap:8px}
.sl:first-child{margin-top:0}
.sl::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(184,134,11,.3),transparent)}
.ic{background:rgba(255,255,255,0.6);border:1px solid rgba(180,160,130,.25);border-right:2px solid var(--gold);border-radius:8px;padding:11px 13px;font-size:13px;line-height:1.75;color:var(--txt2)}
.ci{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.5);border:1px solid rgba(180,160,130,.2);border-radius:10px;padding:9px 12px;cursor:pointer;margin-bottom:6px;transition:all .2s}
.ci:hover{border-color:var(--gold);background:rgba(184,134,11,.07);transform:translateX(-2px);box-shadow:0 2px 12px rgba(184,134,11,.1)}
.cd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cn{font-size:13px;font-weight:600;color:var(--txt)}
.cr{font-size:11px;color:#9a8878;margin-right:auto}

#footer{height:var(--fh);background:var(--glass-dark);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--brd-dark);display:flex;align-items:center;justify-content:center;gap:10px;font-size:11px;color:#a09080}
#footer a{color:var(--gold2);text-decoration:none;font-weight:600}
#footer a:hover{color:var(--gold3)}
.fsep{color:rgba(80,70,55,.5)}

@media(max-width:640px){
  :root{--pw:100vw}
  #panel{position:absolute;bottom:var(--fh);left:0;right:0;height:55vh;z-index:800;border-radius:16px 16px 0 0;border-right:none;border-top:1px solid rgba(200,190,180,.3)}
  .fg label{display:none}
  h1 span{display:none}
}
</style>
</head>

}

function getFilt(){
  var w=sw.value, c=sc.value;
  if(c!=="all") return DATA.filter(function(d){return d.country===c;});
  if(w!=="all") return DATA.filter(function(d){return d.war===w;});
  return DATA;
}

function render(){
  // Remove old markers
  activeMarkers.forEach(function(m){map.removeLayer(m);});
  activeMarkers=[];
  closePanel();

  var rows=getFilt();  // ← ONLY the filtered rows
  var active=rows.filter(function(d){return /פולש|פעיל|מותקף|תוקפת|חזית|הובלה|יוזם/.test(d.role);}).length;
  document.getElementById("pt").textContent=rows.length+" רשומות";
  document.getElementById("pa").textContent=active+" פעילות";

  // Group filtered rows by country
  var byC={};
  rows.forEach(function(r){
    if(!byC[r.country]) byC[r.country]=[];
    byC[r.country].push(r);
  });

  // Place marker only for countries in current filter
  Object.keys(byC).forEach(function(name){
    var entries=byC[name];
    var coords=GEO[name];
    if(!coords) return;
    var col=rc(entries[0].role);
    var size=entries.length>1?17:14;
    var m=L.marker([coords[0],coords[1]],{icon:makeIcon(col,size)}).addTo(map);
    var tip=entries.length>1 ? name+" ("+entries.length+" מערכות)" : name+" — "+entries[0].war;
    m.bindTooltip(tip,{className:"mtt",direction:"top",offset:[0,-8]});
    m.on("click",function(){showPanel(entries[0],rows);});
    activeMarkers.push(m);
  });
}
